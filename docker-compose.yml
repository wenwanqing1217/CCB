version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus-blindbox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: campus_blindbox
      MYSQL_USER: blindbox
      MYSQL_PASSWORD: blindbox123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus-blindbox-network

  redis:
    image: redis:7-alpine
    container_name: campus-blindbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campus-blindbox-network

  mongodb:
    image: mongo:6
    container_name: campus-blindbox-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123456
      MONGO_INITDB_DATABASE: campus_blindbox
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - campus-blindbox-network

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: campus-blindbox-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - campus-blindbox-network

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: campus-blindbox-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    volumes:
      - rocketmq_data:/home/rocketmq/logs
      - rocketmq_data:/home/rocketmq/store
    networks:
      - campus-blindbox-network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: campus-blindbox-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - campus-blindbox-network

  kibana:
    image: kibana:8.11.0
    container_name: campus-blindbox-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - campus-blindbox-network

  prometheus:
    image: prom/prometheus:latest
    container_name: campus-blindbox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - campus-blindbox-network

  grafana:
    image: grafana/grafana:latest
    container_name: campus-blindbox-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - campus-blindbox-network

  skywalking-oap:
    image: apache/skywalking-oap-server:9.5.0
    container_name: campus-blindbox-skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    environment:
      - SW_STORAGE=h2
    networks:
      - campus-blindbox-network

  skywalking-ui:
    image: apache/skywalking-ui:9.5.0
    container_name: campus-blindbox-skywalking-ui
    ports:
      - "8080:8080"
    environment:
      - SW_OAP_ADDRESS=http://skywalking-oap:12800
    depends_on:
      - skywalking-oap
    networks:
      - campus-blindbox-network

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  rocketmq_data:
  es_data:
  prometheus_data:
  grafana_data:

networks:
  campus-blindbox-network:
    driver: bridge

# ==========================================
# 微服务配置（可选启动）
# 使用方式：docker-compose -f docker-compose.yml -f docker-compose.microservices.yml up -d
# ==========================================
