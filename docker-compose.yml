version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campus-blindbox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_blindbox}
      MYSQL_USER: ${MYSQL_USER:-blindbox}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blindbox123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - campus-blindbox-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campus-blindbox-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - campus-blindbox-network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: campus-blindbox-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-root123456}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-campus_blindbox}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - campus-blindbox-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u root -p root123456 --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: campus-blindbox-rocketmq-namesrv
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    volumes:
      - rocketmq_namesrv_data:/home/rocketmq/namesrv/logs
    networks:
      - campus-blindbox-network
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876"]
      interval: 30s
      timeout: 10s
      retries: 3

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: campus-blindbox-rocketmq-broker
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_PROXY_PORT:-8081}:8081"
    volumes:
      - rocketmq_broker_data:/home/rocketmq/broker/logs
      - rocketmq_broker_store:/home/rocketmq/broker/store
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    networks:
      - campus-blindbox-network
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: campus-blindbox-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - campus-blindbox-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  rocketmq_namesrv_data:
  rocketmq_broker_data:
  rocketmq_broker_store:
  minio_data:

networks:
  campus-blindbox-network:
    driver: bridge
