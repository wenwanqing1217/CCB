server:
  port: 8006

spring:
  application:
    name: message-service

  datasource:
    url: jdbc:mysql://localhost:3306/message_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  redis:
    host: localhost
    port: 6379
    database: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.campusblindbox: DEBUG
