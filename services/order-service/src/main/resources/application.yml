server:
  port: 8003

spring:
  application:
    name: order-service

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/campus_blindbox?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # RocketMQ配置
  rocketmq:
    name-server: localhost:9876
    producer:
      group: order-producer-group

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
