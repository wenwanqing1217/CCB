name: Deploy Cloud Functions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
      CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
      CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy cloud functions
        run: |
          echo "Deploying cloudfunctions..."
          if [ -d "./cloudfunctions" ]; then
            for d in cloudfunctions/*; do
              if [ -d "$d" ]; then
                name=$(basename "$d")
                echo "Deploying $name"
                cloudbase functions:deploy --envId $CLOUDBASE_ENV_ID --name $name --src "$d" || (echo "Deploy failed for $name"; exit 1)
              fi
            done
          else
            echo "No cloudfunctions dir"
          fi
