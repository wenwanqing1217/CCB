name: Code Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-check:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: lint
        run: |
          npm run lint -- --output-file eslint-results.json --formatter json || true
          cat eslint-results.json | head -50

      - name: Check for console.log
        run: |
          echo "=== Checking for console.log statements ==="
          grep -r "console\.log" cloudfunctions/ --include="*.js" | grep -v "node_modules" || echo "No console.log found"

      - name: Check for TODO comments
        run: |
          echo "=== Checking for TODO comments ==="
          grep -r "TODO\|FIXME\|HACK" cloudfunctions/ --include="*.js" | grep -v "node_modules" || echo "No TODO/FIXME/HACK found"

      - name: Check code complexity
        run: |
          echo "=== Checking for complex functions ==="
          for file in cloudfunctions/*/index.js; do
            functions=$(grep -c "function " "$file" 2>/dev/null || echo "0")
            if [ "$functions" -gt 20 ]; then
              echo "Warning: $file has $functions functions"
            fi
          done

      - name: Generate quality report
        run: |
          echo "=== Code Quality Report ==="
          echo "Files checked: $(find cloudfunctions -name '*.js' | wc -l)"
          echo "Total lines: $(find cloudfunctions -name '*.js' -exec cat {} \; | wc -l)"
